spring:
  application:
    name: collector-shop

  datasource:
    url: jdbc:postgresql://localhost:5432/collector_shop
    username: collector_shop
    password: collector_shop

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: "change-this-secret-key-for-prod-32-bytes-minimum-1234"
  expiration-ms: 3600000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

