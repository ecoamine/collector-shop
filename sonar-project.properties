sonar.projectKey=ecoamine_collector-shop
sonar.organization=ecoamine
sonar.projectName=collector-shop
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java

sonar.java.binaries=backend/target/classes
sonar.junit.reportPaths=backend/target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/coverage/**,**/test-results/**,**/playwright-report/**

# Frontend coverage (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info