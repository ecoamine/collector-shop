name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  backend:
    name: Backend tests + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests with JaCoCo
        working-directory: backend
        run: mvn -B clean test

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco

  frontend:
    name: Frontend lint, build & E2E
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (dépendances frontend)
        working-directory: frontend
        continue-on-error: true
        run: |
          npm audit 2>&1 | tee npm-audit-report.txt
          npm audit --json > npm-audit-report.json 2>&1 || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.txt

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Generate Nginx TLS cert (CI)
        run: |
          mkdir -p infra/nginx/certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout infra/nginx/certs/key.pem -out infra/nginx/certs/cert.pem \
            -subj "/CN=localhost"

      - name: Start stack
        working-directory: infra/compose
        run: docker compose up -d --build

      - name: Wait backend health
        run: |
          for i in {1..30}; do
            if curl -k -sf https://localhost/actuator/health; then
              echo "Backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "Backend not ready"
          exit 1

      - name: Wait frontend
        run: |
          for i in {1..20}; do
            if curl -k -sf https://localhost/; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend not ready"
          exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://localhost
        run: npm run test:e2e

      - name: Stop stack
        if: always()
        working-directory: infra/compose
        run: docker compose down -v

  docker-build:
    name: Docker production-like build
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Generate Nginx TLS cert (CI)
        run: |
          mkdir -p infra/nginx/certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout infra/nginx/certs/key.pem -out infra/nginx/certs/cert.pem \
            -subj "/CN=localhost"

      - name: Build stack
        working-directory: infra/compose
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Trivy scan (backend image)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image \
            --exit-code 0 --format table compose-backend:latest 2>&1 | tee trivy-backend.txt

      - name: Trivy scan (frontend image)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image \
            --exit-code 0 --format table compose-frontend:latest 2>&1 | tee trivy-frontend.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-backend.txt
            trivy-frontend.txt

      - name: Smoke backend
        run: |
          curl -sf http://localhost:8080/actuator/health
          echo "Backend OK"

      - name: Smoke frontend
        run: |
          curl -sf http://localhost:5173
          echo "Frontend OK"

      - name: Stop stack
        if: always()
        working-directory: infra/compose
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  sonar:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build backend and generate coverage
        working-directory: backend
        run: mvn -B clean test

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
