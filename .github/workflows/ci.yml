name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:

  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B clean test

  frontend:
    name: Frontend build & E2E
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Start stack
        working-directory: infra/compose
        run: docker compose up -d --build

      - name: Wait backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "Backend not ready"
          exit 1

      - name: Wait frontend
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:5173; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend not ready"
          exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Stop stack
        if: always()
        working-directory: infra/compose
        run: docker compose down -v

  docker-build:
    name: Docker production-like build
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build stack
        working-directory: infra/compose
        run: docker compose up -d --build

      - name: Smoke backend
        run: |
          curl -sf http://localhost:8080/actuator/health
          echo "Backend OK"

      - name: Smoke frontend
        run: |
          curl -sf http://localhost:5173
          echo "Frontend OK"

      - name: Stop stack
        if: always()
        working-directory: infra/compose
        run: docker compose down -v