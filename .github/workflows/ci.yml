name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

  frontend:
    name: Frontend build & E2E
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start application stack
        working-directory: infra/compose
        env:
          COMPOSE_PROJECT_NAME: collector_shop_ci
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:5173/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          exit 1

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Tear down application stack
        if: always()
        working-directory: infra/compose
        env:
          COMPOSE_PROJECT_NAME: collector_shop_ci
        run: docker compose down -v

  docker-build:
    name: Docker prod-like build & smoke
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run stack
        working-directory: infra/compose
        env:
          COMPOSE_PROJECT_NAME: collector_shop_docker_build
        run: |
          docker compose up -d --build
          sleep 10

      - name: Smoke test backend
        run: |
          curl -sf http://localhost:8080/actuator/health | head -1
          echo "Backend health OK"

      - name: Smoke test frontend
        run: |
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:5173/ | grep -q 200
          echo "Frontend OK"

      - name: Tear down
        if: always()
        working-directory: infra/compose
        env:
          COMPOSE_PROJECT_NAME: collector_shop_docker_build
        run: docker compose down -v
