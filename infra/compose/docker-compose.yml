version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: collector_shop
      POSTGRES_USER: collector_shop
      POSTGRES_PASSWORD: collector_shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector_shop -d collector_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/collector_shop
      SPRING_DATASOURCE_USERNAME: collector_shop
      SPRING_DATASOURCE_PASSWORD: collector_shop
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

